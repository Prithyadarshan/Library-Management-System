<!DOCTYPE html>
<html lang="en">
<head>
    <title>Library Management System - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; background: url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da') no-repeat center center/cover; position: relative; }
        body::before { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); }
        .container { text-align: center; position: relative; z-index: 1; color: white; }
        .title { font-size: 32px; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; }
        .box { background: rgba(255, 255, 255, 0.95); width: 340px; padding: 25px; border-radius: 15px; box-shadow: 0px 10px 25px rgba(0,0,0,0.4); opacity: 0; transform: translateY(40px); transition: 0.6s ease; }
        .box.show { opacity: 1; transform: translateY(0); }
        h2 { margin-bottom: 20px; color: #333; }
        .field { text-align: left; margin-bottom: 15px; }
        .field label { font-size: 14px; color: #555; }
        .field input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; background: linear-gradient(to right, #667eea, #764ba2); color: white; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        p { margin-top: 15px; font-size: 14px; color: #333; }
        a { text-decoration: none; color: #667eea; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="title">Library Management System</div>
    <div class="box" id="loginBox">
        <h2>Login Panel</h2>
        <form id="loginForm">
            <div class="field">
                <label>Username / Email</label>
                <input type="text" id="uname" required placeholder="admin or registered email">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="pwd" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <p>New customer? <a href="signup_page.html">Create an Account</a></p>
        </form>
    </div>
</div>
<script>
window.onload = function () { document.getElementById("loginBox").classList.add("show"); };

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const uname = document.getElementById("uname").value.trim();
    const pwd = document.getElementById("pwd").value;

    if (uname === "admin" && pwd === "admin") {
        localStorage.setItem("userRole", "admin");
        window.location.href = "admin_role.html"; 
        return;
    }

    const registeredUsers = JSON.parse(localStorage.getItem("users") || "[]");
    const foundUser = registeredUsers.find(u => u.email === uname && u.password === pwd);

    if (foundUser) {
        localStorage.setItem("userRole", "customer");
        localStorage.setItem("currentUserName", foundUser.firstname);
        window.location.href = "Book_Management.html"; 
    } else {
        alert("Invalid login details! Use admin/admin or sign up as a customer.");
    }
});
</script>
</body>
</html>
